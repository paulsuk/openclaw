name: Sync upstream

on:
  schedule:
    - cron: '0 8 * * *'  # 8am UTC daily
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SYNC_BRANCH: bot/sync-upstream
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect sync token
        id: auth
        env:
          SYNC_UPSTREAM_TOKEN: ${{ secrets.SYNC_UPSTREAM_TOKEN }}
        run: |
          if [ -n "$SYNC_UPSTREAM_TOKEN" ]; then
            echo "has_sync_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_sync_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure auth remote
        env:
          PUSH_TOKEN: ${{ secrets.SYNC_UPSTREAM_TOKEN != '' && secrets.SYNC_UPSTREAM_TOKEN || github.token }}
        run: |
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Fetch upstream and merge
        id: sync
        run: |
          base_sha="$(git rev-parse HEAD)"
          git remote add upstream https://github.com/openclaw/openclaw.git
          git fetch upstream
          git merge upstream/main --no-edit
          if git diff --quiet "$base_sha" HEAD -- .github/workflows; then
            echo "workflow_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "workflow_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push sync directly to main
        if: steps.sync.outputs.workflow_changes == 'false'
        run: git push origin HEAD:main

      - name: Require dedicated token for workflow-file updates
        if: steps.sync.outputs.workflow_changes == 'true' && steps.auth.outputs.has_sync_token == 'false'
        run: |
          echo "Upstream sync included .github/workflows changes."
          echo "Add the SYNC_UPSTREAM_TOKEN repo secret so this workflow can push a review branch and open a PR."
          exit 1

      - name: Push review branch for workflow-file updates
        if: steps.sync.outputs.workflow_changes == 'true' && steps.auth.outputs.has_sync_token == 'true'
        run: |
          git push --force origin HEAD:refs/heads/${SYNC_BRANCH}

      - name: Open or reuse review PR for workflow-file updates
        if: steps.sync.outputs.workflow_changes == 'true' && steps.auth.outputs.has_sync_token == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_UPSTREAM_TOKEN }}
        run: |
          main_sha="$(git ls-remote origin "refs/heads/main" | cut -f1)"
          branch_sha="$(git ls-remote origin "refs/heads/${SYNC_BRANCH}" | cut -f1)"
          if [ -z "$branch_sha" ] || [ "$branch_sha" = "$main_sha" ]; then
            echo "Review branch has no commits ahead of main; skipping PR creation."
            exit 0
          fi

          existing_pr="$(gh pr list --head "${SYNC_BRANCH}" --base main --state open --json number --jq '.[0].number')"
          if [ -n "$existing_pr" ]; then
            echo "Reusing existing PR #$existing_pr for upstream workflow changes."
          else
            set +e
            pr_output="$(gh pr create \
              --base main \
              --head "${SYNC_BRANCH}" \
              --title "chore: review upstream workflow sync" \
              --body "Scheduled upstream sync merged cleanly but included changes under .github/workflows. Review this PR before landing workflow updates on main." 2>&1)"
            pr_status=$?
            set -e
            if [ $pr_status -eq 0 ]; then
              echo "$pr_output"
            elif echo "$pr_output" | grep -F "No commits between main and ${SYNC_BRANCH}" >/dev/null 2>&1; then
              echo "Review branch has no commits ahead of main; skipping PR creation."
            else
              echo "$pr_output"
              exit $pr_status
            fi
          fi
